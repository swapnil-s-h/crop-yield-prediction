<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rainfall Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Crop Prediction</a>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="predict.html">Predict Yield</a></li>
        <li class="nav-item"><a class="nav-link" href="suggest.html">Suggest Crops</a></li>
        <li class="nav-item"><a class="nav-link active" href="weather.html">Weather/Soil</a></li>
        <li class="nav-item"><a class="nav-link" href="rainfall.html">Rainfall</a></li>
        <li class="nav-item"><a class="nav-link" href="results.html">Results</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <h2 class="mb-4 heading-home-page">Auto-Fetch RainFall Details</h2>

  <div class="row g-3">
      <div class="col-md-6">
          <input type="number" id="latitude" class="form-control" placeholder="Latitude" required>
      </div>
      <div class="col-md-6">
          <input type="number" id="longitude" class="form-control" placeholder="Longitude" required>
      </div>
  </div>
  <div class="mt-4 map-container">
    <h5 class="pick-location-from-map">Pick Location from Map:</h5>
    <div id="map" style="height: 310px; width: 65%; border: 1px solid #ccc;" class="mt-3"></div>
  </div>

  <div class="text-center mt-4">
      <button id="fetch-rainfall" class="btn btn-primary">Fetch Rainfall</button>
  </div>

  <div id="rainfall-result" class="mt-4"></div>
</div>

<div class="container mt-4">
  <h4 class="rainfall-statistics">Rainfall Statistics</h4>
  <div class="row mb-3">
    <div class="col-md-4">
      <label for="viewMode">Select View:</label>
      <select id="viewMode" class="form-select">
        <option value="month">Monthly Avg (all states)</option>
        <option value="year">Annual by Year (selected state)</option>
      </select>
    </div>
    <div class="col-md-4" id="yearInputContainer">
      <label for="yearInput">Select Year:</label>
      <input type="number" id="yearInput" class="form-control" value="2024">
    </div>
  </div>

  <canvas id="rainChart" height="100"></canvas>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
<script src="scripts/rainfall.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  // Initialize Map
  const map = L.map('map').setView([22.9734, 78.6569], 5); // Centered on India
  
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);
  
  // Listen to map clicks
  map.on('click', function(e) {
      const lat = e.latlng.lat.toFixed(6);
      const lon = e.latlng.lng.toFixed(6);
  
      // Set the values to Latitude and Longitude input fields
      document.getElementById('latitude').value = lat;
      document.getElementById('longitude').value = lon;
  
      alert(`Location selected:\nLatitude: ${lat}\nLongitude: ${lon}`);
  });
  </script>
  

</body>
</html>
