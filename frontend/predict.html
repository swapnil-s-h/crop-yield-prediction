<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Predict Crop Yield</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="predict.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">Crop Prediction</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="predict.html">Predict Yield</a></li>
          <li class="nav-item"><a class="nav-link" href="suggest.html">Suggest Crops</a></li>
          <li class="nav-item"><a class="nav-link" href="weather.html">Weather/Soil</a></li>
                  <li class="nav-item"><a class="nav-link" href="rainfall.html">Rainfall</a></li>

          <li class="nav-item"><a class="nav-link" href="results.html">Results</a></li>
        </ul>
      </div>
    </div>
  </nav>

<!-- Main Content -->
<div class="container mt-5">
    <div class="text-center">
        <h2 class="heading-home-page">Predict Crop Yield</h2>
    </div>

    <form id="predict-form" class="mt-4">
        <div class="row g-3">
            <div class="col-md-6">
                <label for="state" class="form-label">Select State</label>
                <select id="state" class="form-select predict-input-elements" required></select>
            </div>
            <div class="col-md-6">
                <label for="district" class="form-label">Select District</label>
                <select id="district" class="form-select predict-input-elements" required disabled>
                    <option>Select a state first</option>
                </select>
            </div>
            <div class="col-md-6">
                <label for="crop" class="form-label">Select Crop</label>
                <select id="crop" class="form-select predict-input-elements" required>
                </select>
            </div>
            <div class="col-md-6">
                <label for="season" class="form-label">Select Season</label>
                <select id="season" class="form-select predict-input-elements" required>
                    <option value="0">Kharif</option>
                    <option value="1">Rabi</option>
                    <option value="2">Zaid</option>
                </select>
            </div>
            <div class="col-md-6">
                <label for="crop_year" class="form-label">Crop Year</label>
                <input type="number" id="crop_year" class="form-control predict-input-elements" required>
            </div>
            <div class="col-md-6">
                <label for="area" class="form-label">Area (in hectares)</label>
                <input type="number" id="area" class="form-control predict-input-elements" step="any" required>
            </div>
        </div>
        <div class="mt-5 map-container">
            <h5 class="pick-location-from-map">Pick Location from Map:</h5>
            <div id="map" style="height: 310px; width: 65%;" class="mt-3 rounded shadow"></div>
        </div>

        <div class="text-center mt-4">
            <button type="submit" class="btn btn-success btn-lg">Predict</button>
        </div>
    </form>

    <div id="result" class="alert alert-info mt-4" style="display:none;"></div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
<script src="scripts/common.js"></script>
<script src="scripts/crops.js"></script>
<script src="scripts/predict.js"></script>
<script>
    // Initialize Map
    const map = L.map('map').setView([22.9734, 78.6569], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);
    
    map.on('click', function(e) {
        const lat = e.latlng.lat.toFixed(6);
        const lon = e.latlng.lng.toFixed(6);
    
        document.getElementById('latitude').value = lat;
        document.getElementById('longitude').value = lon;
    
        alert(`Location selected:\nLatitude: ${lat}\nLongitude: ${lon}`);
    });
</script>

</body>
</html>
